<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIT Global | Sales Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0d1b2a; --blue: #1e6fb5; --gold: #e8a020; --gray: #f5f6f8; }
        body { font-family: 'DM Sans', sans-serif; background: var(--gray); margin: 0; display: flex; color: #1a2436; min-height: 100vh; }
        
        /* SIDEBAR CLOCKS */
        .sidebar { width: 280px; background: var(--navy); color: white; height: 100vh; padding: 20px; position: fixed; overflow-y: auto; box-sizing: border-box; z-index: 100; }
        .sidebar h3 { margin: 0 0 20px 0; font-size: 18px; border-bottom: 1px solid #2d3748; padding-bottom: 10px; color: white; }
        .clock-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        .clock-label { font-size: 10px; font-weight: 700; color: #a0aec0; text-transform: uppercase; margin-bottom: 2px; letter-spacing: 0.5px; }
        .clock-time { font-size: 19px; font-weight: 700; color: white; font-family: 'Courier New', monospace; }
        
        /* MAIN CONTENT */
        .main { margin-left: 280px; padding: 30px; flex: 1; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 850px; height: fit-content; }
        .card h2 { margin: 0 0 25px 0; color: var(--navy); border-left: 5px solid var(--blue); padding-left: 15px; }
        
        /* FORM STYLING */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 5px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 6px; color: #4a5568; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #dde1e7; border-radius: 6px; font-size: 14px; box-sizing: border-box; background: #fafafa; }
        input:focus, textarea:focus { outline: none; border-color: var(--blue); background: white; }
        
        button { background: var(--blue); color: white; border: none; padding: 16px; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 20px; font-size: 16px; transition: all 0.2s; }
        button:hover { background: #165a94; transform: translateY(-1px); }
        button:disabled { background: #a0aec0; cursor: not-allowed; }
        
        #syncStatus { margin-top: 20px; text-align: center; font-weight: 600; min-height: 24px; }
    </style>
</head>
<body>
