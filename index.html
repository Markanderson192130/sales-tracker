<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CIT Global | Sales Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0d1b2a; --blue: #1e6fb5; --gold: #e8a020; --green: #1d7a4f; --red: #b83232; --gray: #f5f6f8; }
        body { font-family: 'DM Sans', sans-serif; background: var(--gray); margin: 0; display: flex; color: #1a2436; }
        .sidebar { width: 300px; background: var(--navy); color: white; height: 100vh; padding: 25px; position: fixed; overflow-y: auto; }
        .clock-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        .clock-label { font-size: 10px; font-weight: 700; color: #a0aec0; text-transform: uppercase; }
        .clock-time { font-size: 20px; font-weight: 700; color: white; font-family: monospace; }
        .main { margin-left: 300px; padding: 30px; width: calc(100% - 300px); }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 4px; color: #718096; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #dde1e7; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        button { background: var(--blue); color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #165a94; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin-bottom: 20px;">🇦🇺 CIT Clock Wall</h2>
    <div class="clock-box"><div class="clock-label">Sydney / Melbourne</div><div id="c1" class="clock-time">--:--:--</div></div>
    <div class="clock-box"><div class="clock-label">Brisbane (QLD)</div><div id="c2" class="clock-time">--:--:--</div></div>
    <div class="clock-box"><div class="clock-label">Adelaide (SA)</div><div id="c3" class="clock-time">--:--:--</div></div>
    <div class="clock-box"><div class="clock-label">Darwin (NT)</div><div id="c4" class="clock-time">--:--:--</div></div>
    <div class="clock-box"><div class="clock-label">Perth (WA)</div><div id="c5" class="clock-time">--:--:--</div></div>
    <div class="clock-box" style="border-left-color: #4a5568;"><div class="clock-label">LOCAL (IST)</div><div id="c6" class="clock-time" style="color:#a0aec0;">--:--:--</div></div>
</div>

<div class="main">
    <div class="card">
        <h3>📝 Log Sales Activity</h3>
        <form id="clientForm">
            <div class="form-grid">
                <div class="form-group"><label>Rep Name</label><input type="text" id="repName" required></div>
                <div class="form-group"><label>Client / Business</label><input type="text" id="clientName" required></div>
                <div class="form-group"><label>Description Name</label><input type="text" id="descName" placeholder="e.g. Receptionist / Manager"></div>
                <div class="form-group"><label>Contact Number</label><input type="text" id="phone"></div>
                <div class="form-group"><label>Email Address</label><input type="email" id="email"></div>
                <div class="form-group"><label>Printer / Ink Details</label><input type="text" id="details"
