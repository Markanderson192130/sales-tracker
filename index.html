<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CIT Global | Sales Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0d1b2a; --blue: #1e6fb5; --gold: #e8a020; --gray: #f5f6f8; }
        body { font-family: 'DM Sans', sans-serif; background: var(--gray); margin: 0; display: flex; color: #1a2436; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--navy); color: white; height: 100vh; padding: 20px; position: fixed; overflow-y: auto; box-sizing: border-box; }
        .clock-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--gold); }
        .clock-label { font-size: 10px; font-weight: 700; color: #a0aec0; text-transform: uppercase; margin-bottom: 2px; }
        .clock-time { font-size: 18px; font-weight: 700; color: white; font-family: monospace; }
        .main { margin-left: 280px; padding: 30px; flex: 1; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 800px; margin: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 4px; color: #718096; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #dde1e7; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        button { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
        #syncStatus { margin-top: 15px; text-align: center; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
