<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CIT Global | Sales Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0d1b2a; --blue: #1e6fb5; --gold: #e8a020; --gray: #f5f6f8; }
        body { font-family: 'DM Sans', sans-serif; background: var(--gray); margin: 0; display: flex; color: #1a2436; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--navy); color: white; height: 100vh; padding: 20px; position: fixed; box-sizing: border-box; }
        .clock-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        .clock-label { font-size: 10px; font-weight: 700; color: #a0aec0; text-transform: uppercase; }
        .clock-time { font-size: 19px; font-weight: 700; color: white; font-family: monospace; }
        .main { margin-left: 280px; padding: 30px; flex: 1; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 800px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 11px; font-weight: 700; margin: 10px 0 4px 0; color: #4a5568; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #dde1e7; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        button { background: var(--blue); color: white; border: none; padding: 16px; border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 20px; font-size: 16px; }
        #msg { margin-top: 15px; text-align: center; font-weight: bold; color: #1d7a4f; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="border-bottom: 1px solid #2d3748; padding-bottom: 10px;">🇦🇺 CIT Clock Wall</h3>
    <div class="clock-box"><div class="clock-label">Sydney / NSW</div><div id="c1" class="clock-time">--:--:--</div></div>
    <div class="clock-box"><div class="clock-label">Brisbane / QLD</div><div id="c2" class="clock-time">--:--:--</div></div>
    <div class="clock-box"><div class="clock-label">Adelaide / SA</div><div id="c3" class="clock-time">--:--:--</div></div>
    <div class="clock-box"><div class="clock-label">Perth / WA</div><div id="c4" class="clock-time">--:--:--</div></div>
    <div class="clock-box" style="border-left-color: #4a5568;"><div class="clock-label">Local (IST)</div><div id="c5" class="clock-time">--:--:--</div></div>
</div>

<div class="main">
    <div class="card">
        <h2 style="margin-top:0;">📝 Log Sales Activity</h2>
        <form id="f">
            <div class="form-grid">
                <div><label>Rep Name</label><input type="text" id="r" required></div>
                <div><label>Client Name</label><input type="text" id="cl" required></div>
                <div><label>Contact Number</label><input type="text" id="ph"></div>
                <div><label>Email Address</label><input type="email" id="em"></div>
                <div class="full"><label>Printer / Ink Details</label><input type="text" id="det" required></div>
                <div>
                    <label>Status</label>
                    <select id="st">
                        <option value="SALE">SALE</option>
                        <option value="CALLBACK">CALLBACK</option>
                        <option value="FOLLOWUP">FOLLOW UP</option>
                        <option value="NOT_INTERESTED">NOT INTERESTED</option>
                    </select>
                </div>
                <div class="full"><label>Notes / Follow-up</label><textarea id="nt" rows="3"></textarea></div>
            </div>
            <button type="submit" id="btn">Save to Master Sheet</button>
        </form>
        <div id="msg"></div>
    </div>
</div>

<script>
    function update() {
        const o = { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true };
        document.getElementById('c1').innerText = new Date().toLocaleTimeString('en-US',{...o, timeZone:'Australia/Sydney'});
        document.getElementById('c2').innerText = new Date().toLocaleTimeString('en-US',{...o, timeZone:'Australia/Brisbane'});
        document.getElementById('c3').innerText = new Date().toLocaleTimeString('en-US',{...o, timeZone:'Australia/Adelaide'});
        document.getElementById('c4').innerText = new Date().toLocaleTimeString('en-US',{...o, timeZone:'Australia/Perth'});
        document.getElementById('c5').innerText = new Date().toLocaleTimeString('en-US',{...o, timeZone:'Asia/Kolkata'});
    }
    setInterval(update, 1000); update();

    const URL = "https://script.google.com/macros/s/AKfycbzRRtwAJcEXOh-PUFCrsd7HQSzuRN7kPdhINmAI1BsNcFc433aiL9popY5SWUW-FhAb/exec";
    
    document.getElementById('f').onsubmit = (e) => {
        e.preventDefault();
        document.getElementById('btn').innerText = "Syncing...";
        const data = { 
            rep: document.getElementById('r').value, 
            client: document.getElementById('cl').value,
            phone: document.getElementById('ph').value,
            email: document.getElementById('em').value,
            details: document.getElementById('det').value,
            type: document.getElementById('st').value,
            notes: document.getElementById('nt').value
        };
        fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
        .then(() => {
            document.getElementById('msg').innerText = "✓ RECORD SAVED SUCCESSFULLY";
            document.getElementById('btn').innerText = "Save to Master Sheet";
            document.getElementById('f').reset();
            setTimeout(() => { document.getElementById('msg').innerText = ""; }, 5000);
        });
    };
</script>
</body>
</html>
